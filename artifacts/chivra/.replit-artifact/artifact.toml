kind = "web"
previewPath = "/"
title = "Chivra"
version = "1.0.0"
id = "artifacts/chivra"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21534

[services.development]
run = "pnpm --filter @workspace/chivra run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/chivra", "run", "build" ]
publicDir = "artifacts/chivra/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21534"
BASE_PATH = "/"
