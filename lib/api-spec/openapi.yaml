openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Chivra AI Social Network API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: contacts
    description: AI contact management
  - name: messages
    description: Chat messages
  - name: relationships
    description: Relationship states
  - name: status
    description: AI status posts
  - name: openai
    description: OpenAI AI chat and audio operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /contacts:
    get:
      operationId: listContacts
      tags: [contacts]
      summary: List all AI contacts with latest message and unread count
      responses:
        "200":
          description: List of AI contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContactSummary"
    post:
      operationId: createContact
      tags: [contacts]
      summary: Create a new AI contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContactBody"
      responses:
        "201":
          description: Created contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"

  /contacts/{id}:
    get:
      operationId: getContact
      tags: [contacts]
      summary: Get a single AI contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      operationId: updateContact
      tags: [contacts]
      summary: Update an AI contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContactBody"
      responses:
        "200":
          description: Updated contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteContact
      tags: [contacts]
      summary: Delete an AI contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /contacts/{id}/activity:
    get:
      operationId: getContactActivity
      tags: [contacts]
      summary: Get contact activity state and online status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contact activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactActivity"

  /contacts/{id}/messages:
    get:
      operationId: listMessages
      tags: [messages]
      summary: List messages in a chat with an AI contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: before
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a user message and get an AI streaming response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "200":
          description: SSE stream of AI reply chunks
          content:
            text/event-stream: {}

  /contacts/{id}/messages/mark-read:
    post:
      operationId: markMessagesRead
      tags: [messages]
      summary: Mark all messages in a chat as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarkReadResponse"

  /contacts/{id}/relationship:
    get:
      operationId: getRelationship
      tags: [relationships]
      summary: Get the relationship state with an AI contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Relationship state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Relationship"
    patch:
      operationId: updateRelationship
      tags: [relationships]
      summary: Request a relationship state change
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRelationshipBody"
      responses:
        "200":
          description: Updated relationship
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Relationship"

  /contacts/{id}/memory:
    get:
      operationId: getMemory
      tags: [contacts]
      summary: Get the AI memory context for a contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Memory data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Memory"

  /contacts/{id}/status:
    get:
      operationId: listContactStatus
      tags: [status]
      summary: List status posts for a contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Status posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StatusPost"

  /status/feed:
    get:
      operationId: getStatusFeed
      tags: [status]
      summary: Get combined status feed from all AI contacts
      responses:
        "200":
          description: Combined feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StatusPostWithContact"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [contacts]
      summary: Get dashboard summary — total contacts, unread count, active relationships
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOpenaiConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"

  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"

  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOpenaiMessageBody"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}

  /openai/conversations/{id}/voice-messages:
    post:
      operationId: sendOpenaiVoiceMessage
      tags: [openai]
      summary: Send audio and receive a streaming voice response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOpenaiVoiceMessageBody"
      responses:
        "200":
          description: SSE stream of transcript and audio chunks
          content:
            text/event-stream: {}

  /openai/generate-image:
    post:
      operationId: generateOpenaiImage
      tags: [openai]
      summary: Generate an image from a text prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateOpenaiImageBody"
      responses:
        "200":
          description: Generated image data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateOpenaiImageResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Contact:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        gender:
          type: string
        personalityTone:
          type: string
        languageStyle:
          type: string
        emotionalBehavior:
          type: string
        avatarUrl:
          type: ["string", "null"]
        activityState:
          type: string
        bio:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - gender
        - personalityTone
        - languageStyle
        - emotionalBehavior
        - activityState
        - createdAt

    ContactSummary:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        gender:
          type: string
        avatarUrl:
          type: ["string", "null"]
        activityState:
          type: string
        relationshipState:
          type: string
        lastMessage:
          type: ["string", "null"]
        lastMessageAt:
          type: ["string", "null"]
          format: date-time
        unreadCount:
          type: integer
      required:
        - id
        - name
        - gender
        - activityState
        - relationshipState
        - unreadCount

    CreateContactBody:
      type: object
      properties:
        name:
          type: string
        gender:
          type: string
        personalityTone:
          type: string
        languageStyle:
          type: string
        emotionalBehavior:
          type: string
        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
      required:
        - name
        - gender
        - personalityTone
        - languageStyle
        - emotionalBehavior

    UpdateContactBody:
      type: object
      properties:
        name:
          type: string
        avatarUrl:
          type: ["string", "null"]
        activityState:
          type: string
        bio:
          type: ["string", "null"]

    ContactActivity:
      type: object
      properties:
        id:
          type: integer
        activityState:
          type: string
        lastSeenAt:
          type: ["string", "null"]
          format: date-time
      required:
        - id
        - activityState

    Message:
      type: object
      properties:
        id:
          type: integer
        contactId:
          type: integer
        sender:
          type: string
        content:
          type: string
        messageType:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - contactId
        - sender
        - content
        - messageType
        - isRead
        - createdAt

    SendMessageBody:
      type: object
      properties:
        content:
          type: string
        messageType:
          type: string
      required:
        - content

    MarkReadResponse:
      type: object
      properties:
        updated:
          type: integer
      required:
        - updated

    Relationship:
      type: object
      properties:
        contactId:
          type: integer
        state:
          type: string
        updatedAt:
          type: string
          format: date-time
      required:
        - contactId
        - state
        - updatedAt

    UpdateRelationshipBody:
      type: object
      properties:
        state:
          type: string
      required:
        - state

    Memory:
      type: object
      properties:
        contactId:
          type: integer
        userName:
          type: ["string", "null"]
        facts:
          type: array
          items:
            type: string
        emotionalContext:
          type: ["string", "null"]
        updatedAt:
          type: string
          format: date-time
      required:
        - contactId
        - facts
        - updatedAt

    StatusPost:
      type: object
      properties:
        id:
          type: integer
        contactId:
          type: integer
        content:
          type: string
        imageUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - contactId
        - content
        - createdAt

    StatusPostWithContact:
      type: object
      properties:
        id:
          type: integer
        contactId:
          type: integer
        contactName:
          type: string
        contactAvatarUrl:
          type: ["string", "null"]
        content:
          type: string
        imageUrl:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - contactId
        - contactName
        - content
        - createdAt

    DashboardSummary:
      type: object
      properties:
        totalContacts:
          type: integer
        totalUnread:
          type: integer
        activeRelationships:
          type: integer
        friendCount:
          type: integer
        partnerCount:
          type: integer
        onlineCount:
          type: integer
      required:
        - totalContacts
        - totalUnread
        - activeRelationships
        - friendCount
        - partnerCount
        - onlineCount

    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt

    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt

    CreateOpenaiConversationBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    SendOpenaiMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    SendOpenaiVoiceMessageBody:
      type: object
      properties:
        audio:
          type: string
          description: Base64-encoded audio data
      required:
        - audio

    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required:
        - id
        - title
        - createdAt
        - messages

    GenerateOpenaiImageBody:
      type: object
      properties:
        prompt:
          type: string
        size:
          type: string
          enum: ["1024x1024", "512x512", "256x256"]
      required:
        - prompt

    GenerateOpenaiImageResponse:
      type: object
      properties:
        b64_json:
          type: string
      required:
        - b64_json

    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
